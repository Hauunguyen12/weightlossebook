<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&amp;family=Plus+Jakarta+Sans:wght@500;700&amp;display=swap');
      .bg { fill: #F9F6F0; }
      .border { fill: none; stroke: #E25C38; stroke-width: 3; }
      .title { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 32px; fill: #1F2937; text-anchor: middle; }
      .subtitle { font-family: 'Playfair Display', serif; font-style: italic; font-weight: 400; font-size: 26px; fill: #E25C38; text-anchor: middle; }
      .desc { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 500; font-size: 11px; fill: #4B5563; text-anchor: middle; letter-spacing: 0.5px; }
      .tagline { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 9px; fill: #E25C38; text-anchor: middle; letter-spacing: 2px; }
      .arrow { fill: none; stroke: #E25C38; stroke-width: 2.5; stroke-linecap: round; }
      .core-circle { fill: #1F2937; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="560" class="bg" />
  
  <!-- Outer Border -->
  <rect x="15" y="15" width="370" height="530" class="border" />
  <rect x="20" y="20" width="360" height="520" fill="none" stroke="#1F2937" stroke-width="1" opacity="0.2" />

  <!-- Logo Icon at Top -->
  <g transform="translate(200, 70) scale(0.8)">
    <polygon points="0,-25 22,-12 22,12 0,25 -22,12 -22,-12" fill="none" stroke="#1F2937" stroke-width="2"/>
    <path d="M-6,8 C-6,2 -1,0 0,-12 C1,0 6,2 6,8 Z" fill="none" stroke="#1F2937" stroke-width="2"/>
    <path d="M-10,3 C-4,1 -2,-3 0,-12" fill="none" stroke="#1F2937" stroke-width="1.5"/>
    <path d="M10,3 C4,1 2,-3 0,-12" fill="none" stroke="#1F2937" stroke-width="1.5"/>
  </g>

  <!-- Typography -->
  <text x="200" y="140" class="title">THE</text>
  <text x="200" y="185" class="title">METABOLIC</text>
  <text x="200" y="230" class="title">RESET</text>
  
  <line x1="120" y1="260" x2="280" y2="260" stroke="#E25C38" stroke-width="1.5" />
  
  <text x="200" y="295" class="desc">RECLAIMING YOUR BRAIN AND BODY</text>
  <text x="200" y="315" class="desc">FROM THE SUGAR HIJACK</text>

  <!-- Vector Metabolism Reset Icon -->
  <g transform="translate(200, 410) scale(1.1)">
    <!-- Rotating Arrows Cycle representing metabolism -->
    <path class="arrow" d="M-25,0 A25,25 0 1,1 0,25" />
    <path class="arrow" d="M25,0 A25,25 0 1,1 0,-25" stroke="#1F2937" />
    <!-- Arrowheads -->
    <path d="M0,21 L0,29 L-5,25 Z" fill="#E25C38" />
    <path d="M0,-21 L0,-29 L5,-25 Z" fill="#1F2937" />
    
    <!-- Sparkles/Energy indicators inside -->
    <path d="M-8,-8 L-6,-4 L-2,-4 L-5,-1 L-3,3 L-8,1 L-13,3 L-11,-1 L-14,-4 L-10,-4 Z" fill="#E25C38" opacity="0.8" transform="scale(0.8)" />
    <path d="M8,8 L10,12 L14,12 L11,15 L13,19 L8,17 L3,19 L5,15 L2,12 L6,12 Z" fill="#E2BA55" opacity="0.8" transform="scale(0.8)" />
  </g>

  <!-- Footer Tagline -->
  <line x1="50" y1="505" x2="350" y2="505" stroke="#E25C38" stroke-width="1" opacity="0.3" />
  <text x="200" y="520" class="tagline">BALANCE. CLARITY. FLEXIBILITY.</text>
</svg>
