<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700&amp;family=Plus+Jakarta+Sans:wght@500;700&amp;display=swap');
      .bg { fill: #EAE8E2; }
      .border { fill: none; stroke: #111111; stroke-width: 2; }
      .heading { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 18px; fill: #111111; text-anchor: middle; }
      .subheading { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 500; font-size: 11px; fill: #4A4A4A; text-anchor: middle; letter-spacing: 1px; }
      .avatar-bg { fill: #FFFFFF; stroke: #111111; stroke-width: 1.5; }
      .silhouette { fill: #0B4A30; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="300" height="300" class="bg" />
  <rect x="10" y="10" width="280" height="280" class="border" />
  
  <!-- Stylized Portrait Circle -->
  <circle cx="150" cy="110" r="60" class="avatar-bg" />
  
  <g transform="translate(150, 110)">
    <!-- Head silhouette -->
    <circle cx="0" cy="-10" r="22" class="silhouette" />
    <!-- Shoulders silhouette -->
    <path d="M-40,35 C-40,10 -20,12 0,12 C20,12 40,10 40,35 Z" class="silhouette" />
    <!-- Hair outline for female expert -->
    <path d="M-22,-10 C-22,-30 0,-32 22,-10 C22,-5 20,5 15,2 C10,-1 5,-5 0,-5 C-5,-5 -10,-1 -15,2 C-20,5 -22,-5 -22,-10 Z" fill="#E2BA55" />
    <!-- Glasses (Intellectual touch) -->
    <rect x="-12" y="-14" width="8" height="6" rx="1" fill="none" stroke="#FFFFFF" stroke-width="1.5" />
    <rect x="4" y="-14" width="8" height="6" rx="1" fill="none" stroke="#FFFFFF" stroke-width="1.5" />
    <line x1="-4" y1="-11" x2="4" y2="-11" stroke="#FFFFFF" stroke-width="1.5" />
  </g>
  
  <!-- Title Typography -->
  <text x="150" y="215" class="heading">Dr. Sarah Jenkins</text>
  <line x1="80" y1="230" x2="220" y2="230" stroke="#111111" stroke-width="1" />
  <text x="150" y="250" class="subheading">MENOPAUSE &amp; GUT HEALTH EXPERT</text>
  <text x="150" y="265" class="subheading">BOARD-CERTIFIED NUTRITIONIST</text>
</svg>
