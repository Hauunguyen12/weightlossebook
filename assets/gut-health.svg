<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&amp;family=Plus+Jakarta+Sans:wght@500;700&amp;display=swap');
      .bg { fill: #0B4A30; }
      .border { fill: none; stroke: #E2BA55; stroke-width: 3; }
      .title { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 32px; fill: #E2BA55; text-anchor: middle; }
      .subtitle { font-family: 'Playfair Display', serif; font-style: italic; font-weight: 400; font-size: 24px; fill: #E2BA55; text-anchor: middle; }
      .desc { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 500; font-size: 11px; fill: #F4F1EA; text-anchor: middle; letter-spacing: 1px; }
      .tagline { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 9px; fill: #E2BA55; text-anchor: middle; letter-spacing: 2px; }
      .icon-path { fill: none; stroke: #E2BA55; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="560" class="bg" />
  
  <!-- Outer Border -->
  <rect x="15" y="15" width="370" height="530" class="border" />
  <rect x="20" y="20" width="360" height="520" fill="none" stroke="#E2BA55" stroke-width="1" opacity="0.5" />

  <!-- Hexagon Logo Icon at Top -->
  <g transform="translate(200, 70) scale(0.8)">
    <polygon points="0,-25 22,-12 22,12 0,25 -22,12 -22,-12" fill="none" stroke="#E2BA55" stroke-width="2"/>
    <path d="M-6,8 C-6,2 -1,0 0,-12 C1,0 6,2 6,8 Z" fill="none" stroke="#E2BA55" stroke-width="2"/>
    <path d="M-10,3 C-4,1 -2,-3 0,-12" fill="none" stroke="#E2BA55" stroke-width="1.5"/>
    <path d="M10,3 C4,1 2,-3 0,-12" fill="none" stroke="#E2BA55" stroke-width="1.5"/>
  </g>

  <!-- Typography -->
  <text x="200" y="140" class="title">Gut Health</text>
  <text x="200" y="180" class="subtitle">for</text>
  <text x="200" y="225" class="title">Menopause</text>
  <text x="200" y="265" class="title">Weight Loss</text>
  
  <line x1="120" y1="290" x2="280" y2="290" stroke="#E2BA55" stroke-width="1.5" />
  
  <text x="200" y="320" class="desc">HEAL YOUR GUT MICROBIOME,</text>
  <text x="200" y="340" class="desc">BALANCE HORMONES &amp; MELT STUBBORN</text>
  <text x="200" y="360" class="desc">BELLY FAT AFTER 40</text>

  <!-- Stylized Gut Icon -->
  <g transform="translate(200, 430) scale(1.1)">
    <!-- Stomach/Gut silhouette line -->
    <path class="icon-path" d="M-30,-25 C-30,-15 -25,-10 -15,-10 C-5,-10 0,-15 10,-10 C20,-5 25,-15 25,-25" opacity="0.3" />
    <!-- Intestine folds -->
    <path class="icon-path" d="M-20,-5 C-25,-5 -25,5 -15,5 C-5,5 -5,-3 5,-3 C15,-3 15,5 20,5" />
    <path class="icon-path" d="M-18,5 C-22,5 -22,13 -12,13 C-2,13 -2,5 8,5 C18,5 18,13 14,13" />
    <path class="icon-path" d="M-10,13 C-15,13 -15,21 -5,21 C5,21 5,13 12,13" />
    <path class="icon-path" d="M-8,21 C-12,21 -12,29 -2,29 C8,29 8,21 4,21" />
    <!-- Glowing rays -->
    <circle cx="0" cy="5" r="45" fill="none" stroke="#E2BA55" stroke-width="1" stroke-dasharray="2,6" opacity="0.5" />
  </g>

  <!-- Footer Tagline -->
  <line x1="50" y1="505" x2="350" y2="505" stroke="#E2BA55" stroke-width="1" opacity="0.5" />
  <text x="200" y="520" class="tagline">SCIENCE-BACKED. NATURALLY POWERFUL.</text>
</svg>
